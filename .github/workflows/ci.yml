name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ai-runner

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ai-runner/backend/requirements.txt
            ai-runner/backend/requirements-base.txt
            ai-runner/backend/requirements-dev.txt
            ai-runner/backend/requirements-ci.txt

      - name: Install Python dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Verify Python dependency graph
        run: |
          python -m pip check
          python -m pip_audit --local
          python -m pip_audit -r backend/requirements.txt --no-deps --disable-pip

      - name: Run backend tests and coverage gate
        run: python -m pytest backend/tests -q --cov=backend --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-runner/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit and build frontend
        run: |
          npm audit --audit-level=moderate
          npm run build

      - name: Configure native backend project
        shell: pwsh
        run: |
          cmake -S native -B native/build-ci -DSTRATA_ENABLE_CUDA=OFF
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path native/build-ci/CMakeCache.txt)) { throw 'Native CMake configuration did not produce CMakeCache.txt' }

      - name: Check Tauri Rust application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force src-tauri/binaries/ai_runner_backend-x86_64-pc-windows-msvc.exe | Out-Null
          cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ai-runner/coverage.xml
          if-no-files-found: ignore
